<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" style="background-color: #0B0C10;">
  <defs>
    <!-- Свечение для Электрона -->
    <filter id="glowElectron" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Свечение для Протона -->
    <filter id="glowProton" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Свечение для Нейтрона -->
    <filter id="glowNeutron" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Фоновая фазовая сетка (Нейтринный фон) -->
  <g stroke="#1F2833" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="266" y1="0" x2="266" y2="400" />
    <line x1="533" y1="0" x2="533" y2="400" />
  </g>

  <!-- ========================================== -->
  <!-- 1. ЭЛЕКТРОН (Хопфион / Мёбиус)            -->
  <!-- ========================================== -->
  <g transform="translate(133, 180)" filter="url(#glowElectron)">
    <!-- Знак бесконечности / Скрученный тор -->
    <path d="M 0 0 C 40 -60, 80 -60, 80 0 C 80 60, 40 60, 0 0 C -40 -60, -80 -60, -80 0 C -80 60, -40 60, 0 0 Z" 
          fill="none" stroke="#45f3ff" stroke-width="8" />
    <circle cx="0" cy="0" r="10" fill="#45f3ff" />
  </g>
  <text x="133" y="310" text-anchor="middle" fill="#45f3ff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">ЭЛЕКТРОН</text>
  <text x="133" y="335" text-anchor="middle" fill="#C5C6C7" font-family="Arial, sans-serif" font-size="14">Хопфион (Lk = 0.5)</text>
  <text x="133" y="355" text-anchor="middle" fill="#66FCF1" font-family="Arial, sans-serif" font-size="12">Состояние: +1 (Устойчив)</text>

  <!-- ========================================== -->
  <!-- 2. ПРОТОН (Трилистник)                    -->
  <!-- ========================================== -->
  <g transform="translate(400, 180)" filter="url(#glowProton)">
    <!-- Идеальный симметричный трилистник -->
    <path d="M 0 0 C 50 -100, -50 -100, 0 0" fill="none" stroke="#FFB703" stroke-width="8" />
    <path d="M 0 0 C 50 -100, -50 -100, 0 0" transform="rotate(120)" fill="none" stroke="#FFB703" stroke-width="8" />
    <path d="M 0 0 C 50 -100, -50 -100, 0 0" transform="rotate(240)" fill="none" stroke="#FFB703" stroke-width="8" />
    <circle cx="0" cy="0" r="12" fill="#FFB703" />
  </g>
  <text x="400" y="310" text-anchor="middle" fill="#FFB703" font-family="Arial, sans-serif" font-size="18" font-weight="bold">ПРОТОН</text>
  <text x="400" y="335" text-anchor="middle" fill="#C5C6C7" font-family="Arial, sans-serif" font-size="14">Трилистник (Lk = 3)</text>
  <text x="400" y="355" text-anchor="middle" fill="#FFB703" font-family="Arial, sans-serif" font-size="12">Состояние: +1 (Абсолютный Резонанс)</text>

  <!-- ========================================== -->
  <!-- 3. НЕЙТРОН (Недотрилистник)               -->
  <!-- ========================================== -->
  <g transform="translate(666, 180)" filter="url(#glowNeutron)">
    <!-- Два стабильных лепестка -->
    <path d="M 0 0 C 50 -100, -50 -100, 0 0" transform="rotate(120)" fill="none" stroke="#00FF87" stroke-width="8" />
    <path d="M 0 0 C 50 -100, -50 -100, 0 0" transform="rotate(240)" fill="none" stroke="#00FF87" stroke-width="8" />
    <!-- Разорванный / дефектный лепесток -->
    <path d="M 0 0 C 50 -100, -50 -100, 0 0" stroke-dasharray="10 8" fill="none" stroke="#FF3366" stroke-width="8" />
    <!-- Топологический разрыв (Сингулярность дефекта) -->
    <circle cx="0" cy="-45" r="8" fill="#FFFFFF" />
    <path d="M -15 -45 L 15 -45 M 0 -60 L 0 -30" stroke="#FFFFFF" stroke-width="3" />
    <circle cx="0" cy="0" r="10" fill="#00FF87" />
  </g>
  <text x="666" y="310" text-anchor="middle" fill="#00FF87" font-family="Arial, sans-serif" font-size="18" font-weight="bold">НЕЙТРОН</text>
  <text x="666" y="335" text-anchor="middle" fill="#C5C6C7" font-family="Arial, sans-serif" font-size="14">Недотрилистник (Lk = 2.5)</text>
  <text x="666" y="355" text-anchor="middle" fill="#FF3366" font-family="Arial, sans-serif" font-size="12">Двигатель Эволюции: 0 \rightarrow +1</text>

</svg>
